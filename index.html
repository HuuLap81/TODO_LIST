<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="style.css"></script>

    <title>Todo App</title>
    <!-- Bootstrap CSS -->
    <link
      rel="stylesheet"
      href="node_modules/bootstrap/dist/css/bootstrap.min.css"
    />
    <!-- Bootstrap JS -->
    <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body>
    <div
      class="container border rounded p-5 mt-5"
      style="border: 3px solid #667eea !important"
    >
      <h2>Todo App</h2>

      <div class="input-group mb-3">
        <input
          id="todoInput"
          type="text"
          class="form-control"
          placeholder="Nhập thông tin nhắc nhở..."
          onkeydown="handleEnter(event)"
        />
        <button class="btn btn-primary" onclick="addTodo()">Add</button>
      </div>

      <div class="search-container mb-3 d-flex justify-content-end">
        <input
          id="searchInput"
          type="text"
          class="form-control w-auto"
          placeholder="Search todos..."
          onkeydown="handleEnter(event)"
        />
        <span class="input-group-text"> 🔍 </span>
      </div>

      <div class="d-flex gap-2 mb-3" role="group" aria-label="Basic example">
        <button class="btn btn-primary" onclick="setFilter('all')">ALL</button>

        <button class="btn btn-primary" onclick="setFilter('active')">
          ACTIVE
        </button>

        <button class="btn btn-primary" onclick="setFilter('done')">
          COMPLETED
        </button>

        <button class="btn btn-danger" onclick="clearComplete()">
          CLEAR COMPLETED
        </button>
      </div>

      <ul id="todoList" class="list-group"></ul>
    </div>
      <div class="chatbox">
        <iframe
          src="https://chat.openai.com/chat"
          title="ChatGPT"
          width="100%"
          height="400px"
          style="border: none; margin-top: 20px;"
        ></iframe>
      </div>

    <script src="script.js"></script>
  </body>
</html>
